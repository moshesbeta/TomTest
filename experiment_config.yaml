# 实验配置文件

# LLM 配置
llm:
  model_name: Qwen3-8B
  api_key: ---  # 支持环境变量
  api_url: http://localhost:8000/v1
  temperature: 0.6
  max_tokens: 8192
  max_workers: 64
  enable_thinking: false


# LLM Judge 配置（可选，用于需要 judge 的数据集如 ToMi）
judge:
  model_name: Qwen3-8B
  api_key: ---  # 支持环境变量
  api_url: http://localhost:8000/v1
  temperature: 0.0
  max_tokens: 4096

# 实验参数
repeats: 3
max_samples: 100  # 0 表示使用全部样本

# 路径配置
datasets_path: datasets
results_path: results
